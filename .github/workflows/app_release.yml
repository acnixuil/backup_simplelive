name: app-build

on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * 5'

jobs:
  build-ios-android:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: master

      - name: Download Android keystore
        id: android_keystore
        uses: timheuer/base64-to-file@v2
        with:
          fileName: keystore.jks
          encodedString: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Create key.properties
        run: |
          echo "storeFile=${{ steps.android_keystore.outputs.filePath }}" > simple_live_app/android/key.properties
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> simple_live_app/android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> simple_live_app/android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> simple_live_app/android/key.properties

      - uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      - name: Flutter action
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true

      - name: Restore packages
        run: |
          cd simple_live_app
          flutter pub get

      - name: Build APK
        run: |
          cd simple_live_app
          flutter build apk --release --target-platform android-arm,android-arm64 --split-per-abi

      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: android
          path: |
            simple_live_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            simple_live_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk

      # - name: Upload Release
      #   uses: softprops/action-gh-release@v1
      #   with:
      #     tag_name: "test-release"
      #     name: "test-release"
      #     generate_release_notes: true
      #     prerelease: false
      #     token: ${{ secrets.GITHUB_TOKEN }}
      #     files: |
      #       simple_live_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
      #       simple_live_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk

      - run: echo "🍏 This job's status is ${{ job.status }}."

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: master

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true

      - name: Enable Flutter Desktop
        run: flutter config --enable-windows-desktop

      - name: Restore Packages
        run: |
          cd simple_live_app
          flutter pub get

      - name: Install flutter_distributor
        run: dart pub global activate flutter_distributor

      - name: Build Windows
        run: |
          cd simple_live_app
          flutter_distributor package --platform windows --targets msix,zip --skip-clean

      - name: Upload Windows APP to Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows
          path: |
            simple_live_app/build/dist/*/*.msix
            simple_live_app/build/dist/*/*.zip

      # - name: Upload Release
      #   uses: softprops/action-gh-release@v1
      #   with:
      #     tag_name: "test-release"
      #     name: "test-release"
      #     generate_release_notes: true
      #     prerelease: false
      #     token: ${{ secrets.GITHUB_TOKEN }}
      #     files: |
      #       simple_live_app/build/dist/*/*.msix
      #       simple_live_app/build/dist/*/*.zip

      - run: echo "🍏 Windows job's status is ${{ job.status }}."
      
  clean-up:
      needs: [build-ios-android, build-windows]
      runs-on: ubuntu-latest
      steps:
        - name: Delete workflow runs
          if: always()
          uses: Mattraks/delete-workflow-runs@main
          with:
            token: ${{ github.token }}
            repository: ${{ github.repository }}
            retain_days: 0
            keep_minimum_runs: 1
            delete_workflow_pattern: "${{ github.workflow }}"
            delete_workflow_by_state_pattern: "active"
            delete_run_by_conclusion_pattern: "success, failure, cancelled, skipped"